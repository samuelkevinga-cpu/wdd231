<!DOCTYPE html>
<html lang="en">
<!-- Rooms page: browse, filter, and open room details in a modal -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NestU Rooms | Browse Student Housing</title>
  <meta name="description" content="Browse shared and private rooms at NestU student co-living near campus.">
  <meta name="author" content="Kevin Samuel Pacheco García">
  <meta property="og:title" content="NestU Rooms">
  <meta property="og:description" content="Compare available student rooms by type, price, capacity, and amenities.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/room-images/shared-suite.svg">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/rooms.js"></script>
</head>

<body data-page="rooms">
  <!--header: logo, nav and menu button-->
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="NestU home">NestU</a>
    <button class="menu-button" type="button" aria-label="Open navigation menu" aria-expanded="false"
      aria-controls="primary-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="primary-nav" class="primary-nav" aria-label="Primary navigation">
      <a href="index.html" data-nav="home">Home</a>
      <a href="rooms.html" data-nav="rooms">Rooms</a>
      <a href="visit-book.html" data-nav="visit">Visit &amp; Book</a>
    </nav>
  </header>

  <main>
    <!-- Page intro -->
    <section class="page-intro">
      <p class="eyebrow">Rooms</p>
      <h1>Find your student space</h1>
      <p>Browse room options by privacy, capacity, price, and availability.</p>
    </section>
    <!-- Room browser -->
    <section class="section room-browser">
      <div class="filter-bar" aria-label="Room filters">
        <button class="filter-button active" type="button" data-filter="all">All Rooms</button>
        <button class="filter-button" type="button" data-filter="shared">Shared Rooms</button>
        <button class="filter-button" type="button" data-filter="private">Private Rooms</button>
        <button class="filter-button" type="button" data-filter="lowest">Lowest Price</button>
        <button class="filter-button" type="button" data-filter="highest">Highest Price</button>
      </div>
      <div id="room-count" class="results-count" aria-live="polite"></div>
      <div id="rooms-list" class="room-grid" aria-live="polite"></div>
    </section>
  </main>
  <!-- Room details modal -->
  <div id="room-modal" class="modal" role="dialog" aria-modal="true" aria-label="Room details" hidden>
    <div class="modal-content">
      <button id="close-modal" class="close-modal" type="button" aria-label="Close room details">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>
  <!--footer with copyright, attributions and video demonstration-->
  <footer class="site-footer">
    <p>&copy; <span id="year"></span> NestU. All rights reserved.</p>
    <a href="attributions.html">Attributions</a>
    <!-- TODO: Replace # with your YouTube or Loom video URL before submitting -->
    <a href="#">Video Demonstration</a>
  </footer>
</body>

</html>
